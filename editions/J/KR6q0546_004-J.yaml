body:
  text: 侍者正慧記錄嗣法門人正燈編輯住奉天府東前山臺大悲禪寺語錄康熙庚午歲秋七月望日進院興國寺天宗等請上堂拈香曰身輕似葉任風揚萬里餘程到瀋陽今日復蒙興國請栴檀爐爇九天香上首白椎畢乃曰古人道三世諸佛向火焰裏轉大法輪又道火焰為三世諸佛說法三世諸佛立地聽試問大眾且道火焰為諸佛說的是甚麼法以拂子打曰若向這裏會得始知般若未動腳先興國未起念前四十八願早已宣過苟或未能且聽一偈二百一十億佛剎當年法藏悉觀知今日古林重舉出阿誰不是丈夫兒上首結椎下座龍鳳寺滿藏張名魁孫應選起華嚴會請上堂微塵中經卷明眼人始能拈出所以世尊曰始從鹿野苑終至跋提河於是二中間未曾說一字既未曾說即今看的五部從甚處得來驀舉拂子曰若向這裏見得徹覷得透不須彈指樓閣門八字打開正法眼一時流通釋迦彌勒文殊普賢善財童子五十三師盡在山僧拄杖頭上放光動地轉大法輪與一切眾生抽釘拔楔解粘去縛苟或未然正好披忍辱鎧操智慧劍滅三毒破魔網步步踏著實地心心契證真如作不可思議功勳成無量殊勝奇特直得千古萬古只如今前佛後佛無異道所以法華曰是舍惟有一門而復狹小雖然狹小三世諸佛盡從箇裏出去出去且置畢竟佛在甚麼處喝一喝曰高高峰頂無消息深深海底沒蹤由散會朱宗仁等請上堂炎炎暑伏正中時纔值開經又滿期痛惜韶光容易度時流休把自心欺眾中莫有不欺自心者麼遂舉起拄杖曰若喚作拄杖子便犯當頭不喚作拄杖子又欺自己恁麼也不是不恁麼也不是恁麼不恁麼總不是畢竟作麼生委悉去又卓一下曰向者裏通條活路始得七月十四日起盂蘭會請上堂以法說法無別法以佛見佛無異見佛法見聞總現成當陽直下要親薦舉起拂子曰見麼又擊案曰聞麼者一著子非佛非法非見非聞非有非無非異非如等閑拈丈六金身當一莖草將一莖草作丈六金身於一毫端現寶王剎坐微塵裏轉大法輪所以道一切時一切處一切見聞知覺一切分別取捨一切受用一一俱是諸人二六時中應機接物現成的活計佛佛授手唯授此心祖祖相傳唯傳此妙乃至西天四七也恁麼東土二三也恁麼天下列剎相望諸老宿也恁麼山僧也恁麼且道恁麼一句作麼生道擲拂曰雖然舊閣閑田地一度贏來方始休中元節請上堂丁一卓二是般若體七縱八橫是般若用耀古騰今是般若光烹金琢玉是般若力若能有如是力徹如是光得如是用具如是體便見十世古今始終不離於當念無邊剎海自他不隔於毫端遂以拂子打圓相曰自從一授靈山記直至於今願不忘煆白骨小參目連今日度母般若此時煆骨入聖何須開頤墮凡不必頻顣八兩原是半觔五斗須還一斛頭頭物物現成剎剎塵塵具足只為憎逆愛順所以東出西沒既失頂上玄珠便去水中撈摝若能直下迴光便見本來面目上堂彩雲影裏仙人現手把紅羅扇遮面急須著眼看仙人莫看仙人手中扇拂衫袖曰者是彩雲影揮拂子曰者是紅羅扇作麼生是仙人面團耶方耶長耶短耶紅黃黑白耶諸仁者不用看他只須自看驀地看破自己面孔始識儂家面孔識得儂家面孔方見仙人面孔面孔且置且道適來者一絡索落在什麼處震威一喝曰霧露雲霞時起滅長青自古一般天示眾古之為道學者痛念生死如救頭然勞形枯骨廢寢忘餐行住坐臥如聾似啞時刻照顧本參猶恐打失話頭己事未得分明終不與人閒論侍師必恭必敬不敢動惱一念惟恐不稱師意方是真實衲子未見今時學者全沒信心輕薄狡猾形雖相同心多詭詐到師面前無絲毫真念一味捏鬼捏怪問著不知羞恥不是指東話西便是胡喝亂跳做盡伎倆自心難瞞若是為他加以逼拶便設計較辭去僻處豎憍慢幢打自大鼓誑惑聾俗只圖眼前快樂不思樂是苦因如是之流正是野狐種族破法魔魅玷辱先人污染吾輩我今苦口叮嚀要汝知慚識愧不然聽便還俗各去當差雞棲鳳巢非吾同類示眾操履本分一著不受惡辣鉗鎚豈得成器必要具一片金石心肝生鐵脊梁始能趣向直下將人我是非好惡長短一時坐斷如太阿鋒似塗毒鼓觸著則喪身失命豈尋常細事果到恁麼田地更須刻苦勵志向大爐鞴中幾經煆煉時節到來不妨出來導誘群盲利生接物自是驚群如獅子哮吼百獸腦裂金翅擘海直取龍吞堪報不報之恩共助無為之化今日與大眾聚會在此也是前緣必要將此一件大事徹透始不負十方檀施且道這一件事作麼生透喝一喝曰匹馬衝開龍虎陣單刀直入破重圍示眾古德教人作偈作頌著語者蓋大事已明師資唱和試學者才性利鈍今汝等己事未明一向在文字上作見解豈非大錯你們病痛山僧盡知蓋作詩作偈有你們下手處有你們註腳處有你們卜度處所以個個肯作意思索至於本分事上無你們下手處無你們註腳處無你們湊泊處所以不肯承當殊不知這無下手處無註腳處無湊泊處正是個好消息古德曰百尺竿頭更進一步又曰懸崖撒手到這裏直須努力拼卻性命一上始得努力且置即今有一句子不落文墨不拘音韻三世諸佛摸不著歷代祖師和不齊諸兄弟還有和得者麼若和得者痛與三十棒和不得者亦痛與三十棒何故棒頭有眼明如日賞罰分明作者知示眾此個事在諸佛分上不曾增在眾生分上不曾減只為群迷妄情濃厚蔽卻本明執人執我心猿擾擾耽能耽所意馬騰騰六賊縱橫三毒焰熾堪嗟如斯學道佛性愈求愈遠若是真正丈夫的實要明斯事須開特達懷發大堅固志尋常動靜中兩腳踏實地情識妄緣盡淨屏息佛法玄妙徹底掀翻單提一句話頭朝參暮究念念弗捨心心無間莫管年窮歲盡節換時移一念萬年始終不易必以悟為則餘皆是甚熱碗鳴聲古之造道衲子怕怖生死如救倒懸冬不爐夏不扇尚無剪爪工豈暇閑叨呾時刻照本參生怕落昏散事善知識必恭必敬三二十年不憚辛勤不嫌瑣褻把己躬下事透徹得乾乾淨淨明明白白後出頭來驚天動地方是真參實悟的學者所以趙州三十年不雜用心香林四十年打成一片那有不下苦心苦志真履實踐每日間只在是非中煩惱裏作活計而能悟道明心也大便宜諸仁者山僧今夜造口業絮絮叨叨為要你們發憤精進勿教當面錯過時不待人焂忽白首百無一長愧乎否也茲愧不愧且置眨眼三十夜到來黑面老子打算飯錢那時莫怨山僧不早為道破好示眾昔日靈山殃迦葉後來少室累神光黃梅夜度盧行者臨濟瞎驢冤禍長冤禍且止試問諸人識這一隊漢落處麼即今現在汝等諸人六根門頭晝夜放光乃至乾坤大地萬象森羅明暗色空無一不在此光發現只如光未發時無諸佛眾生消息無山河大地形跡汝等諸人在甚麼處安身立命若也知得不妨出來與山僧拄杖打個折合各垂隻手光耀叢林其或不知且向三條椽下七尺單前豎起脊梁高著眼看他日驀地相逢不妨與方丈通個消息慈洪普照振衣同眾學者入室求開示師曰近日參禪者多悟道者鮮過在甚麼處蓋人無恒心少節義不肯真實操履只愛搬弄虛頭不以己事為極則反以利名為實有雖入門來不念無常迅速苦海沉淪只將古今公案歷代語言築一肚皮貴圖口舌利便此等如蛾撲火如蚕作繭或見先輩安心斷臂負舂繫樁三登九上坐破蒲團便生退屈曰釋迦如來經三大阿僧祗劫脩來纔得睹星悟道我等凡夫豈能成佛作祖不信有悟入之門所謂不信己殊勝甘為下劣人便將難之一字以為藉口古德曰此番難再來不知是何面孔恁麼則不難於今生也何不再看屠兒證果龍女成佛水潦一腳保福招手悟道何易哉有向冊子上鑽尋卜度向知識口邊得些涎唾就便云不過如此何用苦修方名悟道便縱意造業為害不小不見法華經曰是法非思量分別之所能到圓覺經曰汝以思惟心測度如取螢火燒須彌終不能得古德曰擬將心意學玄宗大似西行卻向東或有做了些癡工夫忽認得個昭昭靈靈無形無相有知有識底便說是了者個便是我本來面目念佛的主人公也便是臨濟赤肉團上真人也便是誌公四大有相中的無相也又引波羅提尊者在眼曰見在耳曰聞傅大士夜夜抱佛睡朝朝還共起等頌為證便道生也不妨死也不妨若果如斯便了何故祖師頌又曰學道之人不識真只為從前認識神無始劫來生死本癡人喚作本來人又曰我今問汝汝若認昭昭靈靈是汝真實為甚麼瞌睡時又不成昭昭靈靈若瞌睡時不是為甚麼有昭昭靈靈汝還會麼此是認賊為子是生死根本妄想元氣既瞌睡時做不得主生死到來怎麼生折合一生胡亂做去豈但賺人皆自賺耳或有不唧溜者處處染污一者情不透脫謂一切世間善惡好歹是非順逆等境也須處置停當不肯放下恐傷仁義致人議論務盡小節硜硜然終日沒在事中一者理不透脫將一切佛經大小乘清濁等語當作實法掗在胸中及聞知識所說主其先入不能去短就長如綿搭絮清溷不已殊不知情為生死根本理為所知障難不肯向此兩路截斷縱涉遍叢林參遍知識無能相救矣所以臨濟曰道流爾欲得如法見解但莫受人惑向內向外逢著便殺逢佛殺佛逢祖殺祖逢羅漢殺羅漢逢父母殺父母逢親眷殺親眷始得解脫不與物拘透脫自在或有真實為道來參知識者知識有直截全提者有與話頭者伶俐底直下領略根性遲鈍者千沒柰何萬沒柰何貴圖知識說破知識婆心豈肯害他必要他自己㘞地一聲始得真實受用不被天下人瞞他便道知識吝法不向他說掉臂而去撞入天魔野干隊中一一為他妄評妄論初學聞其語已如毒入心悲哉枉用前功搭獅子皮作野干鳴將吾師拈花直指之旨翻成講席到處教壞世間男女千佛出世不通懺悔今現前諸兄弟幸往昔願力深不落此數甘同般若共守寂寥切勿虛廢光陰精勤憤志定要親見一回方可續佛慧命廣導群迷報佛祖君親師友浸恩努力努力原書闕機緣問如何是乾矢橛師曰逼塞虛空曰如何領會師曰普天匝地僧禮拜師曰會禮拜不會禮拜僧擬議師打曰臭氣燻人問如何是佛性聲未絕師便打曰道甚麼曰佛性師曰山僧是僧去問佛曰和尚豈無方便師便打僧禮拜師復與一踏曰棒打有醒腳踏有餘問青州布衫重七觔意旨如何師曰七零八落曰某甲無處摸索師曰問取隔壁張裁縫去問如何萬法歸一師曰三頭六臂曰畢竟一歸何處師叉手當胸立曰學人不會師打曰魚腮烏嘴得人憎問如何是金剛王寶劍師曰觸不得曰因甚觸不得師打曰頭落也不知僧佇思師復打曰還不拖者死屍去問不歷化城竟登寶所時如何師曰腳跟下好與三十棒曰恁麼則學人獲寶也師曰呈似山僧看僧近前便拜師打曰錯將魚目認明珠巨懷呈偈了師展手曰此是文字將無文字底來懷擬議師劈胸一拳曰會麼曰不會便拜師曰是誰拜出弟子師曰又道不會一僧作禮曰弟子無語問和尚但只稽首讚嘆師曰讚個甚麼僧擬對師掌曰向這裏罵山僧去問劫火洞然大千俱壞未審這個壞也無古人一曰壞一曰不壞畢竟壞底是不壞底是師曰二俱不是曰畢竟如何師曰獅子咬人韓盧逐塊一僧送師骨往千山問曰先師遷化向甚處去也師指千山曰會麼曰不會師曰青山原不動浮雲自往來問如何是西來意師曰何不問自己意曰如何是自己意師曰尋常還思山僧麼曰常思和尚無由禮覲師曰只這是其僧有省問如何是般若境師曰萬木榮紆一溪浩渺曰如何境中人師曰饑餐麥粥倦臥茸草曰人境不立時如何師遂劈面一掌曰是立不立