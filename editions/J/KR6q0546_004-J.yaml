攛下火炬曰布袋與君焚卻去浩歌一曲似忘形為明心舉火明心明心聽吾重徵八年為我勞碌精神屬望百年贊助柰何壽不由人今既吉祥而化自是越格超群攛下火炬曰助汝無情一炬火永證金剛不壞身為善禎禪人舉火有變遷兮無生死無變遷兮有死生要知生死端的意攛下火炬曰烈焰亙天只這是為曉廷居士舉火四十餘年如電行來時何似去時清要知端的去來意烈焰場中善自明遂攛下火炬為無疑上人舉火颯颯秋風遶故園飄飄落葉便歸根既然撒手西方去九品蓮花返本源疑上座聽吾言這段風光已具足大千何處不稱尊為文部大喇嘛舉火如來昔日偃臥示寂文部今朝端坐告終名馳西域德播關東諸方景慕班吉雲從朝官敬仰世祖興崇本望萬里前程豈期一場幻夢今既抽身長往去透過金圈栗棘蓬以火炬擊龕曰大喇嘛急磨礱真空在處露威雄攛下火炬曰萬里神光連頂沒大千杲杲一輪紅為真修上人舉火涅槃不動沒生死寒暑更遷行殺活直下兩頭齊坐斷天長地久乾坤闊惟我真公上人薙髮于徽宗律主得戒於正宇禪師生平截鐵斬釘操履提持向上面有十分春風胸無一毫伎倆三韓重其為人四眾方來欣向今朝撩起便行可作時人榜樣攛下火炬曰吾今助汝一星火直透威音現真相為戶部正堂妙供夫人舉火出也全機見沒也全機見坐斷兩重關獨露本來面伏惟妙供夫人親見盤山信道無倦德性如玉如金道念自鎔自煆正好養乎其真樂乎其善豈期百年頃刻世緣更變忽然撒手西歸畢竟難逾大限今日孝子虔誠請為夫人祖餞更有末後句重為通一線以火炬打相擲下曰烈燄光中綻白蓮無邊剎海都開遍為印真左善世起棺暖日薰風四月天百花開發滿林園印公玩景貪遊賞惹得行人都淚漣恭惟印真老善世禪淨一如福慧具足神機如徹電智辯似淵源提佛祖之紀綱條條有例立叢林之規範事事森然名傳海外德播中原今日化緣畢備可謂耀後光前且臨行一句作麼生道卓拄杖曰途中受用從來具此去如登到岸船舉火當陽直指莫擬議迥脫根塵始瞥地無欠無餘絕正偏亙今亙古沒移易老掌教能事畢臨岐一句重相為勝熱門中信步登毘盧頂上恣遊戲法語示恒修禪人立志辦道切宜堅猛自凡夫直入聖域豈小緣哉必要將從前妄想見解世智辨聰彼我是非一時盡底脫去直下如死人已絕氣息到本分地上大休大歇然後向枯木死灰裏豁然契證始信釋迦以無法而得授記盧老以無物乃付衣缽所以曰以無所得心修無所得行行雖與人同而常與人異到此切不可造次為人但只韜光晦跡守本分忘人世待霜露果熟龍天推出應緣順時開拓人天立一機垂一句普使有情無情並仰威光同受庥廕若無因緣只恁度時不欲人知作個絕學無為真道人可也示禪宗上人實要了明此個大事非艸艸可得先要具一片金石心肝一雙雪白眼睛把向來所聞所見底玄妙理性殊勝奇特擲向他方世界休存一絲毫許打疊得乾乾淨淨單提己躬下大事猛著精彩暮究朝參心心無間參來參去參到佛祖說不去處行不到處撲倒起來鼓掌呵呵元來是這個道理方與三世諸佛把手共行歷代祖師同一鼻孔始不負爾出家一番也若是依依稀稀今日三明日四只是妄想堆裏做來做去疲勞厭倦自生退息反歸咎於禪不靈出得門去無所不為謾道薙髮了脫生死更欠黑面老子飯錢在珍重珍重示慧廣禪人唯此法門至簡至近不勞多聞只要實悟如六祖大師賣薪一聞應無所住而生其心即便了當豈不是至簡至近哉後到黃梅和偈曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃若是個漢於此省去略較些子更要將心待悟何時而達又不聞韶國師曰通玄峰頂不是人間心外無法滿目青山到這裏還有甚佛祖可成禪道可參然斯事本無奇特只要人信得及刻期取證不是說了便休想你我遇斯大難萬里流來得全軀命今得為僧必要拼死做一番莫學時人記幾句口頭語以當了事明眼人覷見未免吐罵上座必欲作脫體衲僧當如我語切莫放逸自有推門落臼之時若能腳跟點地不妨來噇山僧手裏白棒若是虛誕浮華只圖眼前熱鬧有鬼神兮妒君福有陰陽兮促君壽勉旃勉旃示虛白行者汝佐山僧築靜室建茶房費盡辛苦吾非不知本意留爾同居與爾斷除宿習說破末後句子柰爾魔事紛紜不得已而卻汝自此日遠一日矣汝豈不聞先哲行履如慈明更衣入戎馬隊中去參汾陽雪峰三到投子九上洞山皆為道德不顧危亡始得萬古為人天師範豈是今人輕人我慢入門不為道德反要師家以人情回顧稍有回顧不到便生許多是非說長說短只窺探他人行徑不顧自己生死各執管見不信棒喝為人或執幾句之乎也者講論為長或執寫經持念為長或執禮拜磨筋苦骨為長或執一句死話頭將心待悟為長諸如此類自塞悟門流入邪見不是出家了脫生死原為設法討喫而已豈知信施粒米出自血汗不明心地如何消得一息不來定是酬他去也袈裟下失人身豈不痛哉汝既決意出家吾今不得不與汝道破惟恐走錯路途難以相救倘能一念知非但向無佛無眾生處努力窮究日久歲深自然田地穩密始不負與爾薙髮一番也珍重珍重復淨空上座陽城一別倏忽三載上座想有大進益處參學人必借此世磨勵不可因循彷彿趨色力強健討明落腳處不枉出世閻浮走一遭然此個事非造次顢頇所能為也必要具一片金石心肝棒打不回千磨不退如雲門折足夾山落水古人勵志苦行載在方策者不勝屈指必如此行履方有少分相應豈似近時人入得門來自高自大不究自己本分只探他人行徑不信教外單傳只學之乎者也記得兩句白話就去誑他聾俗我自破老人處來的我是忞山翁處來的便稱知識以圖口體悲夫若不明心達本信施粒米難消一息不來定是披毛戴角酬他去豈不痛哉吾不當造此口業但思昔在蓉城曾有針芥機緣豈得不直心相為想上座聰慧明達博古窮今自是發憤超群雖然如是更須拼身捨命向前始得切忌尋章弄句論古論今終是杓卜聽虛聲耳復示一偈棄本逐末事可吁只緣病目見差殊豁然除卻眼中瞖始覺從前是自污寄林眉上人山僧為汝處是汝不知若是知之不是這個行履畏刀避劍非是漢子若是個漢必要就嚴師益友互相砥礪譬如美玉無瑕須假良工琢磨方得成器不然終成廢物有何用處不見仲尼道仁者先難而後獲伯陽曰多易必多難從上聖人無不教人從難處做起果負真誠自然忘其難而致其易若圖其易而捨其難未見有生成彌勒自然釋迦所以安心斷臂踏碓繫樁雪峰飯頭溈山典座只要了明己事不憚勤勞出來個個為人天師世間那有吃現成飯睡現成床橫草不拏豎草不拈而便求得佛法了得生死山僧近日不愛與人打葛藤柰爾隨山僧在初不忍負爾舉則公案問汝荅得許汝在彼把茆蓋頭荅不得急須買草鞋行到水雲庵與汝道破薙髮修行貴圖見性即今性在甚處見得性要了生死生死到來作麼生了了得生死要知去處眼光落地向甚麼處去速道速道然而到這裏道得也出不得這裏道不得也出不得這裏道得道不得總出不得這裏畢竟作麼生道
