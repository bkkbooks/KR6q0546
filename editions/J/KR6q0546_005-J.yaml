body:
  text: 侍者正達記錄嗣法門人正如編輯偈輓了宗和尚十首附臨終語四月十五日了宗和尚到寺見予把手曰汝若請我棄老命還汝故臨終有是語曰來時曾說端的應口真獅子兒隨處哮吼又見我許下彼時不信今日果然頭正尾正樹頭忽爾聽鸝鳴日破浮雲世界清休向顏淵問顏路從來人子諱爺名俱胝提刀勘侍者鹽官索扇驗沙彌師今問汝生前事教我如何說向伊三度問來三度打一番呼喚一番應如何更問娘生面茶飯阿誰去奉承離心意識聖凡緣洞達無依觸處玄拈起纖毫無不是何分生後與生前晝夜慇懃卻是誰那堪更著痛針錐太平治業元無相雨順風調物物宜本色風流是事周何勞特地問生由縱然箭筈鋒鋩迅也落機關第二籌人人有個娘生面覿體分明何不薦惹得老翁布葛藤漫勞千古為方便未生前底事崎嶇若個男兒解到之未到拚身宜急到莫貪途樂操虛脾未生前事有何疑問著人人攢著眉屋遠途長天黑了師徒拖了一身泥問得分明頌得親而今宜假不宜真等閑拋出磚頭去也當黃金謝主人十可行偈晏坐尋常兀坐不思量銕脊撐撐鑄就剛七破蒲團纔好矣清風明月話頭長入室威風八面有誰當佛祖聞驚膽喪亡任你銅頭鐵額漢到來無不盡歸降出坡三陣梆催個個忙搬柴運水好商量艸鞋繩斷擔頭脫把住虛空較短長粥飯粒粒盡從香積來禪流咬著莫疑猜精勤參透廬陵意不二維摩笑眼開洗衣百衲飄飄如柳絮千針結結似星垂莫嫌破碎難湔浣病骨多年幸得披掃地掃盡從前舊滓渣笑看帚上放曇花而今和柄俱無用拋出當陽驗正斜經行飯後經行七佛儀金磚布地許闍黎等閒踏遍閻浮界正眼看來腳未移念經嗟嘆此經人不曉多因紙上徒紛紛入息不居出不染賓盧尊者始超群拜佛金身莊在寶華樓緇素時參便磕頭自拜不知還自起看他著甚死來由道話主賓和合道相同頓脫身心內外空覿面言談親會得大千沙界悉圓融示念經僧五千餘軸止兒啼念到驢年枉自疲句外豁然明了去隨機到處度群迷示禪人三十餘年忽過了五千里路訪吾儕稽首和南相見底問渠端的是誰來林碩林若若還參得禪老僧何用豎空拳腳跟下事未相委一座須彌在眼前林若遍地黃花滿眼秋登高賓主話綢繆林聞若解這些子一喝千江水倒流林聞明空底事近如何鬱鬱黃花三度過生死關頭打未破枉聞般若演摩訶明空萬境萬緣都放下單提向上祖師機懸崖峭壁翻身轉秀宇何常不佛齊秀宇禪堂闃寂甚個事何人闚不識安心旨遍智莫無疑遍智休將文字當逃禪須識壺中別有天老衲剖心相為汝莫教林體負殘年林體老僧善惡莫思量冷則圍爐熱取涼只有這些痛快處行人識得豈尋常老僧般若往還七八秋艸鞋債要老僧酬而今且應他期去踏破回來好聚頭林粲勤勞執役過三年脫盡皮膚頂骨穿再向南方遊歷遍歸來要爾繼燈傳林璧哭楊公計得舊年分袂時牽裳問我訂歸期今來君又歸西去教我如何不淚垂題自像舉世難看這老衲胸中佛法沒些些自把虛空拶出髓惡名流落遍天衢示徒求戒眾生心佛不別煩惱菩提無差只因迷悟隔天涯凡情聖見堪嗟夢中重重做夢沙裏深深算沙爭如直下了無遮現成一著何奢示眾雜言空門得入賴前緣志念要堅行力要堅忘餐廢寢苦鑽研頓斷牽纏憤勇當前水窮山盡見根源識得單傳拈美三玄隨緣觸處自方圓住也樂然去也樂然功成坐斷聖凡津迥出法身認得本人拈來物物自相親不分比鄰不分主賓逢場作戲任天真宗也敷陳教也敷陳橫行沙界不染塵覓個知音了卻前因塵亡暫悠游嘆浮生似蹴毬勞勞碌碌苦貪求若個肯休那個肯丟蜃樓海市焉能久謾懷憂不明箇事來去最堪愁一派灣澴四面山俄移囊缽掛其間唇嘴都盧絕躋攀孰並肩清風明月伴我閑孤光迥迥照人寒惟有飛雲去又還阿誰識得這清安水潺潺樹鳥深林把佛參至理平常離相忘名拚卻身心做一場虛空打破透出圓光超脫苦海樂無窮妙難量萬事無常阿誰痛傷知音何不早迴光牙關咬定豎起脊梁把住虛空稱斤兩較短長個事堂堂莫論短長是與非何必較量一念頓斷萬慮皆忘身雖處世意清淨心清涼心了無事逍遙城市順世隨緣聊相寄雖處世間行超十地應如是作如是用如是為這些些子聖凡皆同行人透出妙無窮不拘廛市豈論山中任自逍遙自快樂自圓通費盡辛艱透脫塵寰佛不為將何去參真空物我無礙清閒有甚賓主甚五位甚三關道無難易只要憤志庭前柏樹用繩鋸繩木忽斷觸翻大地看是何境是何機是何意示眾四首大德胡為到此方毫無佛法可商量再三覓我安心旨好肉何須剜作瘡雲水相逢般若堂柰何愚拙絕商量若將伎倆抵生死屈殺老胡遠渡江一燈續焰百燈明豈是之乎者也行利刃吹毛握在手揮時遍界絕埃塵慚愧虛名處處揚從來不識古文章一條白棒傳心印任爾時流道短長示禪人二十七首廿載相從窮此事一時豁達悟真空頂𩕳觸瞎摩醯眼普照乾坤萬國中普照涉遍江南數十年今來塞外話枯禪言前若解翻身去一切時中恒定然定然三番到此已三年放下身心著意研明悟腳跟親點地始知鼻孔自撩天明悟鼻祖階梯進步行頭陀密意不囊藏自家桶底一番脫始信西來道德長德長眉毛剔起究真空鐵壁銀山徹底通不是心兮不是佛更將何物喚徽宗徽宗曾向千山把鼻穿重來般若學耕田四蹄頭角成軒過更要精勤顧尾顛成軒行要實行心要虛經行坐臥處尋渠忽然撥轉閑關捩活潑靈通始惠如惠如內調海眾費慇懃外助山僧又盡心鐵石肝腸恁麼去到頭始不負雙林雙林謝汝遠來行苦行亂捶一頓當人情慧明冷處重知痛卻罵山僧手太輕慧明既來者裏要心真心若真時道易親除卻道心能著眼慈光迥出見全身慈光百日慇懃般若堂工夫到處始馨香多生道業目前現積劫塵勞當下忘金道人百味調和手段強飽他雲水滿寮房身心為眾何相似清雨汪汪灑大荒清雨頓除妄念泯真念識得左之與右之賢聖位中留不住世間何處可安伊左之徹義還須善自調變生成熟勿辭勞叮嚀無甚閒家具剔起眉毛下一刀徹義超參志氣破重圍散亂昏沉淨盡揮萬里青天無點翳一輪紅日自融暉融暉枯木龍吟仔細聽骷髏眼裏有瞳人他時迸出瞳人眼萬象森羅一度新枯木志念如山屹不搖四威儀處死心調一聲㘞地開雙眼生死輪迴當下消不搖主藏靈文誰個看到來無不為輕安沉淪本體出非易失卻袈裟復更難海藏刀耕火種為林行暮究朝參扣己躬直下若能領略去縱橫處處自融通林行萬境萬機消息盡一知一見杳無存明明此道無人識負了少林格外論林格十年服役最方圓鼻孔昂藏貫徹天他日禪林嗣法去始終到處有因緣林嗣妙年進步急提撕執侍巾瓶絕見知生死關頭研不破灼然辜負古林眉林眉攀緣起倒不相離林厚何曾明得伊年老為僧少及第兩門俱是操虛脾林厚論是論非何日了圖閒圖靜幾時休百年瞬息成虛度林目睜睜何處求林目過去奚須臨後想未來何必預先愁現前些子不能了可惜住山林念頭林念一入叢林恒用心恒心萬境自平沉諸根脫卻塵緣盡纔識祖師的意深林恒鬧市山林本現成何須矯強費追尋通身脫落皮膚盡一點圓明曜古今林本念佛偈五首彌陀一句最分明日用尋常總現成只要自家看得破紅塵堆裏任縱橫彌陀一句日新新截斷萬緣一念真驀地頓忘斯一念毘盧頂上現全身一句彌陀密密綿聲聲字字意昭然等閑薦得聲前意笑殺諸方五味禪一句彌陀在目前祗緣情妄隔三千若能頓斷根塵去觸處逢渠得自然念佛應須心念真念真萬境自平沉好看念盡真忘處一點圓明照古今示建庵袈裟之下莫狐行磚鏡勤磨日月明照見本來真面目始知不枉費工程即事別眾滇黔聚首至芙蓉平地無端鼓黑風莫謂臨岐無一語普賢元不住峨峰送餐霞居士為官須要行慈忍出處常懷濟物心不負當年付囑事大家出手拯沉淪示僧看經四十九年無一字分明直截為君宣柰何不覓根頭意只去枝邊把葉拈示了塵居士學道先須一念真念真何患道難成萬緣泯處常光現歷歷分明是了塵因僧數數歸家示偈出家未透死生關何得歸家便不還倏忽報緣顛倒轉那時空悔自癡頑示大方一法不存猶未玅萬機休歇一非真更須拶碎娘生面始識大方獨步人示明心將心除妄妄難遣著意明心心轉深這裏若能領會去死生凡聖盡平沉示正體正體堂堂無背向切須堅猛力行持懸崖萬仞翻身轉始是金毛獅子兒示德林來學道要堅心百煉紅罏不變金一念之中輕放逸德林翻作棘荊林示修造僧剪荊伐木建雲堂風送招提滿院香直下不能休歇去更於何處費思量示一僧貪睡久參尚自引針錐初學貪眠非所宜不是吾今妄責汝釋迦曾咄蚌螺螄示本源捨妄歸真扣己參何勞涉水與登山饒君踏遍閻浮境未達本源總是閑與辯才萬事隨宜莫強攀休論城市與山間但除自己胸中病勿向他人紙上鑽道性醇和餘習盡覺心圓淨露真顏苟非動轉昭然見端的難逃生死關示無生居士一念無生是事灰不勞窮究自心開腳尖踢出西來意物物頭頭自偶諧送實常居士偶來此地遇知音外護山僧意轉深試看長松不凋落與君同保歲寒心送常居士雲水形骸萬里人蕭然瓢衲乍相親六根可向無生破一笑能諧不染因當世宰官成佛種現前宦海出迷津公家伯仲機緣好共賞寒山雪裏春因士舉瑞巖主人以偈示之目前識破本來空豈用頻頻喚主翁我若念他他念我不如撒手自西東即事荅友道人隨處任悠游何必將來繫念頭縱遇黑風翻鼓浪幾曾沒卻釣魚舟看血書華嚴數年偃息處茅堂一卷華嚴一炷香縱有嘉賓來見訪更無心緒與商量送慈林一回微處一回新秪要闍黎識本人有日腳跟親點地始知吾道出常情送別駕季公學佛為官是事諧休將迷悟掛心懷但能學佛行慈忍處處蓮花火裏開選官選佛夢中夢應馬應牛迷外迷觸碎虛空無向背隨緣處處樂便宜示全安恁麼到底恁麼去放下從頭放下參更問箇中端的意圓明覺性始全安示建庵入此門來扣此禪經行坐臥痛加鞭等閒踏破波心月萬仞峰頭去建庵送能仁老宿幻軀已過古稀年自遠來參般若禪踏破能仁舊面孔始知生死不相關示無憂天命之年正好休知非知止自無憂四威儀處恒提起薦取透關第一籌示洪居士不須斷髮著袈裟箇事從來本不差只要諸根脫落盡一微塵裏綻心花示步步至誠一念莫他馳時刻精專仔細思直到聖凡情盡處始知步步不離伊示正授自幼多年侍座傍執勞負役把身忘好看低首和南句是處無非正授方示正融奔南逐北走西東踏破鐵鞋始正融到此宜須高著眼莫教錯認主人翁示正讓斯門既入莫張乖撥火添香善自裁撞著曩時正讓面不虛棄道就僧來示正立參禪一著最捷徑腳跟須當正立定踏破娘生鼻孔時頭頭物物總相應示正續侍師心念莫支離出入分明絕是非等閒薦得西來意正續綿綿度苦迷示正巡娘生面目甚分明何用區區覓正巡秋至梧桐應見落春來杜宇遍聞聲示正隨起在人前睡在遲正隨函丈勿相違驀然踏著關捩子揭地掀天播有違示正守粒米施來重若山未明道食怎生安不能當下了生死正守心城也是閒示正節為僧須把塵緣絕暮請朝參叩正節他日腳跟親點地始知吾道非常測示正傳半路抽身不著便到頭一著費鑽研若能這裏全知曉更讓阿誰續正傳寄圓融別來已三載底事竟若何幾番寒與暖花開見也麼參禪偈參禪參直指始得明自己瞥爾緣慮生紛然是非起密護在真誠精操惟至理撥轉上頭關孤高誰匹爾參禪宜直截擬議成途轍提起沒底籃盛卻南山鱉一法印萬象三藏絕言說汝若不相應我屈向誰雪參禪這一著非是尋常作拾起龜毛繩緊把虛空縛踢開雪峰毬拈過普化鐸這回纔分明兩眼見寥廓參禪事非常切勿亂思量求佛被佛瞞求法被法障過去不可追未來休指望現前一著子擬議不了當參禪休爭勝只要明自性真機元平等至理無欠剩目下不承當轉身何處證一踏連底空塵塵總相應參禪宜急速切記勿輕忽休將聖量心沉埋塵勞窟北秀勤拂拭南能無一物這裏如未曉屈殺天真佛參禪要鐵漢不受塵物絆截斷聖凡情超過彼此岸縱橫任自由屺與佛祖伴隨處利群生出語如閃電參禪勿亂猜必要心死灰但教忘能所自然絕張乖腳跟穩立定只待頂𩕳開得翻真受用方顯俊良才參禪要英傑不被境緣攝晝夜勤精進動靜加猛烈鏟去有無念掃除是非穴驀然得迸破始是大休歇參禪要老辣切忌弄狡猾必要拼身命如登陣撕殺妖魔並狐兔一時盡勦拔大地狼煙絕無處不通達參禪休綣戀光陰急如電趨此色力強真實下履踐拈卻秘魔叉奪取石鞏箭任他佛祖來都盧做一串參禪須實參不是圖偷安我山連根倒慾海盡底乾須臾勿放縱動靜著眼看必要親見地莫教受他謾參禪要絕囂切忌被塵撓塵境纔萌動識情熾然燒貪痴暫時長道念頃刻消可憐此等輩袈裟換羽毛參禪勿匆匆工夫要得中緊則成執著緩便轉疏慵緊緩兩相稱猶未盡圓融一齊都放下出門路路通參禪須絕愛精勤莫懈怠耕破八識田漏乾七情海千魔與萬難金石心無改只待骷髏穿風光何時買參禪不下工正眼作麼通堪憐學步者踹他舊腳蹤守株那得兔張網豈兜風弄到頭顱白依然睡夢中參禪莫打誑必要大志量休說人是非但除自業障戰退魔軍陣掃盡煙塵瘴縱橫當宇宙佛祖難近傍參禪要孤硬孤硬識邪正千百億法門一時都除竟單提向上宗忘卻己身命驀地通消息極目真如性參禪莫亂解先要絕情愛一念不干懷萬境自空壞豎起鐵脊梁休惜臭皮袋迸破面門時始得大自在參禪要志節始得發憤切舉足碎魔宮赤身遊虎穴縛住走盤珠截斷虛空舌直下悟無生超出塵沙劫參禪要自勉切忌隨他轉莫論有與無管甚深與淺一點靈虛現萬事任舒卷功夫到此時宜當高著眼參禪休卜度理事要盡卻鏟去聖凡心頓除名相縛寸懷虛豁豁一念空索索少存分別心依然成大錯參禪休弄假正念宜緊把內外盡除掃身心全放下勿認奴作郎休指鹿為馬定要見分明莫畏棒頭打參禪莫莽鹵何必論今古打破趙州關搖動巖頭櫓一直透長安那怕境內阻果能恁麼去超佛併越祖參禪最簡直惟貴信得及一道無向背千門絕階級滿眼菩薩光通身如來力好個解脫門深嗟無人入參禪要自責日用發憤三毒盡蠲除六塵豈能惑揣模窮至理必以悟為則頂𩕳具隻眼認出真彌勒參禪宜憤志超越真俗諦放下眾緣心挽回第一義爍開波旬膽洞見能仁智如此了了知利他還自利參禪不堅固未免走錯步撞入荊棘林便曰菩提路可憐恁麼人全不知恐怖奔波度一生到頭無所措參禪沒巧拙只貴心無惑曾不問閒忙豈暇論語默當下絕狐疑始識真奇特拈起一莖艸現萬億佛國參禪無言說渠宜自憤策亦非毒攻毒不是楔出楔吸盡滄溟水踏碎澄潭月一喝分賓主可稱英靈傑參禪無言說只要工夫切頓斷無繩索掀翻繫驢橛縱橫任自由妙用非他決獅子吼一聲野狐頭腦裂參禪不下力學道有何益饒汝說千般爭如行一尺胸中鬧攘攘腳底黑膝膝老病驀臨頭可憐誰痛惜參禪真妙訣能斷生死業指石石點頭棒空空流血滄溟口吸乾大地毛吞攝火焰轉法輪聖賢俱聽說參禪非等閑一念固如山擬向遭他惑將離成自瞞葛藤千七百徹底盡掀翻桶箍脫落了三界沒關欄參禪勿浪走牢把意城守來去本無塵何勞強抖擻但能知邪正不復分妍醜若是金毛兒自然解哮吼參禪絕伎藝勿被文字蔽萬論共千經了然無一字休將口頭語當做真實義必要見得親堪能成法器參禪無剩語切忌莫錯舉饒爾說多般怎如悟少許當真悟道人直截相為汝驀地自肯時堪為般若侶參禪不增進空與般若近嘴上甜似蜜胸中利如刃貢高我慢心肯聽誰教訓任你到驢年也無般若分參禪偈已竟說破參禪病要識般若心盡除驕矜性誠重勞便輕師友時親敬只待自點頭方續佛慧命參禪偈四十珍重同門客文字尚無有何須論平亥祖師道不會諸佛言無得你若不相信我拳劈面摑
