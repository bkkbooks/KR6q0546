body:
  text: 侍者正尚記録嗣法門人正悟編輯住遼陽如來禪院語録康熙癸亥夏四月八日進院尤成伯王成功等請上堂山僧搭底是千佛衣大衆禮底是萬佛懺千佛萬佛總歸一佛那一佛揮拂子曰阿彌陀佛佛在那裏豎起拂子曰在山僧拂子頭上放大光明全身獨露示以梵音高聲唱言吾身充滿於世間吾音普順十方國喻如虛空含萬象於諸境界無分別處處偏坐道場頭頭威光烜赫若向者裏見得始識吾門妙訣為憫閻浮諸苦趣所以分身不可說梯航三有濟四生提振綱宗宏正脈只得人人腳跟下犖落個個頂𩕳上廓徹苟或未能見分明抖擻精神須自策放開胸次冷如冰豎起脊梁硬似鐵聲色名利盡剿除機關理性都教瞥猛然打破這些子一念萬年無變革以拂子打圓相曰至道無難為嫌揀擇以拂子入袖曰見四衆都有揀擇抽身退入毛端去山僧代彼重饒舌何也諸佛法身入我性我性同合如來轍北堡周應元等請上堂今朝冬月十五行者撞鐘擂鼓那識教外單傳本無一字可吐權向方便門頭直指諸人開悟阿誰使汝鞠躬那個教伊退步語默動靜分明當機了無回互更若擬議思量何如抱贓叫苦果能直下承當一認村歌社舞珠取東海驪龍鬚捋南山猛虎扶整舊日風規掃盡今時露布直得露柱燈籠悉皆成佛作祖地藏寺僧同袁文明請上堂千河水凍萬壑林凋潭冰三尺冷非一朝物理有更變時節不相饒一陽才復長群陰便剝消莫嫌霜凜凜休道冷蕭蕭可思枯坐面壁翻憶雪立齊腰可嘆人心澆薄慚惶祖道寂寥雖有攢眉蹙目無非外寂內搖安得大乘根器翻身透出青霄行解相應齊著力大家復把古風招臘八日圓戒胡朝輔請上堂三千年來舉世盡道釋迦老子是今日半夜子時明星出現正眼圓明殊不知正是刺瞎黃面雙睛何也不見道知一切法即心自性成就慧身不由他悟既無他悟世尊睹明星的又是箇甚麼道理驀豎拂子曰若向這裏的當得去則與丹霞高沙彌同一鼻孔同一知見把臂共行何須般若開闡尸羅重勞汝等登壇羯磨因甚如此為他已知本性無非自性戒正所謂戒外無戒又何戒哉苟或未能且與汝等繩上加繩扭上帶扭不是老僧束縛因汝等從無量劫來昧卻了無非自性執人執我向外馳求被四相流入生死苦海之中輪回不息若不先以波羅提木叉轡勒身心向止持作犯處洞明自己法性身身心塋徹超然物表如斯之際覓其能受戒人與所持之戒皆不可得微細開遮之名相復何有也且道憑恁麼力得如是事良久曰衆生受佛戒即入諸佛位位同大覺已真是諸佛子弔水樓弟子正純正照請上堂碧霞深處結禪期雲水四來相共依若有超宗越格漢何妨出衆決情疑提持祖印與玄要輔弼叢林展化基不待九旬已滿後棒頭三十奉酬伊且道有恁麼人麼若無且聽饒舌喝一喝曰太子河中水千山頂上松松水交參處薦取主人翁正月十五日陳僧綱領衆請上堂彌天和氣匝地春風玉苑梅花放銀河冰水溶處處笙歌社舞家家燈月輝紅頭頭顯示少林旨一一宏開鷲嶺宗覿體分明無向背塵塵盡是主人翁委得底丹霄獨步未明底正好用工莫待眼盲耳聵四緣散亂匆匆若是英靈漢子豎肯自昧心胸一回坐斷千差路運用縱橫處處通除夕小參衆兄弟休放逸人生世間如駒過隙個個自知又去一歲矣古人喻修行人臨末稍頭似今夜一般手忙腳亂請各自檢點看手腳穩當也未老漢不敢望汝等逆浪興波也要先識些子慚愧看這口中食身上衣一一出自檀信脂膏勞他監院都管種種作務墮指裂膚夙興夜寐辛勤料理所為何事不過要汝等廝結眉毛豎起脊梁剋期取證然後不捨本願導利衆生同歸至化之中共享無為之樂則彼此有益豈料你們不能盡卻今時到被今時所惑雖入雲堂形留神往坐禪遣香請益無能開示不曉所謂參禪禪不會學道道不識那曉者不知不識正是個好消息不肯承當返去那邊這裏全不思此形骸不是容易得來的他日拋此形骸不是容易得去的若不稱此時節討明落處異日眼光落地何時有出頭分如是憤發頓起疑情立金石心將個本參橫咬豎咬晝參夜參參來參去伎倆盡心境忘忽然迸破疑團啐原來是這個道理然後行遍天下無蹤跡言滿天下無口過終日吃飯咬不著一粒米終日穿衣挂不著一縷絲揚一眉森羅騰輝瞬一目萬象失色高揖釋迦不拜彌勒隨處安間隨處自在且道甚處得與麼力以拂子左右揮曰著著都在這裏小參一歲光陰又擲空兩堂雲水漫推聾好思身後遭他苦快向言前叩己躬迷去頭頭成窒礙悟來處處悉圓融莫教錯過此時節浪死虛生無盡窮若是吾門過量漢潛行必與古人同拚身直趣菩提路鐵壁銀山盡透通雖然與麼究竟將來猶在途中直得拈一莖草作丈六金身將丈六金身作一莖草還未是他住腳處不住且置臘盡春回一句又作麼生道豎起拂子曰不世優曇花正發大千沙界悉馨香元旦上堂滿空瑞氣藹祥光時為拈香祝聖皇四海安寧歌歲稔萬邦平靜樂時康堯風恰似和風溥舜日宛如佛日長頑石昆蟲皆踴躍喬松庭柏盡敷揚棒頭喝下明宗旨五葉一花遍界香大衆還委悉麼個個相逢都一笑舊時人物換新裝屈佛寶孺人對靈小參金剛正體包括十虛自他不隔於毫端般若智光彌滿六合古今不離於當念淨裸裸赤條條有甚生死去來正所謂處生死流驪珠獨耀於滄海踞涅槃岸桂輪孤朗於碧天況佛寶夫人淑德幽間四教母儀不愧三遷持齊念佛樂施好善今年七十一歲無疾怡然順化可見平生向善之驗矣佛寶一夫人還委悉麼莫不有生須知有不生者莫不有死須知有不死者且道如何是不生不死者遂以拂子打圓相曰曾見林宗二老來塵中有術脫塵埃今朝就路歸家去步步蓮花火裏開上堂斯地草年前數請今偕雲水入山來當陽句子親拈出只要人人正眼開根本若正眼若洞明則處處七通八達根本不正眼若瞇則頭頭撞壁面墻不見道孤峰頂上透得鬧市街頭不妨和泥合水鬧市街頭透得孤峰頂上不妨目視雲霄驀豎拄杖曰汝等還透得麼我不敢輕于汝等汝等皆當作佛卓拄杖下座孝子金國梁等薦嚴請小參學道先須達本本立而道自生行善以孝為先孝存而善乃具為善不達其本非善為道不先其孝非道如何是道以拂打相曰會麼清虛之理佛祖罔窺畢竟無身生死何立理則如是如亦不存諸仁者若會得生以不生生為生義則知海會居士七十八年前衆緣和合而生如陽焰翻波覓共生相了不可得會得死以不死死為死義則知海會七十八年後衆緣離散而死如空花落影覓其死相了不可得既生無生死無死金剛正體獨露堂堂如何是金剛正體良久曰離名離相周沙界迥出三乘不假修官純衡請上堂至理洞明會千差于物表玄機獨脫融萬象于毫端頭頭上顯物物無偏花放不萌樹上鳳鳴無影山前木人把板雲中拍石女吹笙過碧天不是四料簡亦非三要玄天龍往豎指庵主空舉拳任伊役使釋迦奴呼彌勒的到來不敢當前般若這裏法令當臺如太阿鋒似大火聚觸犯不得既觸犯不得喚作陰陽時節得麼喚作語默動靜得麼喚作迷悟智愚得麼喚作棒喝主賓得麼到這裏佛祖猶難知凡夫豈易識信手拈將來不費纖毫力既然恁麼為甚凡夫不識皆因執著難忘隨情放逸即今老僧不惜唇皮只要現前緇素同盡大地衆生明這觸犯不得的一著子去且道如何是觸犯不得的一著子以拂子左右揮曰誰知夜睹明星事一念回光尚宛然庠生顧進朝請為母對靈小參記得前月十七弟子應緣事畢生死本無去來聖凡兩途不立既不立正清向什麼處安身立命豎拂曰會麼若會得始知正清六十九年前生本不生六十九年後死本不死正體如如靈光不昧何也為伊了得生不以生為樂死不以死為苦苦樂無拘迥脫生死去來之相顧左右曰老僧無說汝等無聞即今一句又作麼生揮拂子曰一超直入如來地腳下蓮花步步生裴世文薦女請對靈小參生本不來死本不去不去不來中也不住諸仁者還識不住的麼豎起拂子曰這一著子天不能比高地不能比厚日不能比光月不能比照世界不能比大河海不能比深須彌不能並峙虛空不能包藏至大至微至柔至剛縱橫左右洞徹十方窺測無門隨機便應揮拂子曰還知落處麼前日梧桐凋一葉人間何處不驚秋佟國祥薦母請對靈小參秋風秋雨聲如泣似痛善人回首急孝子虔誠請老僧超亡得度波羅蜜我有一句子不惟正溥得度彼岸縱是六親九族四生三有天地日月情與無情悉皆承此恩力一時度脫了也且道是那一句子豎拂子曰喚作拂子則觸不喚作拂子則背不得有言不得無語不得向意根卜度不得拋向無事甲裏如此理會得去始識乾坤以此而立世界以此而成天地以此而覆載日月以此而照臨國王以此而安治天下宰輔以此而調理萬民歷代佛祖以此而傳正法眼一切知識以此而接物利生僧俗以此而修身齊家蠢動含靈以此而改頭換面正溥以此而示現生滅相實無生滅既無生滅且道即今在甚處安身立命揮拂子曰彌陀接引惟心淨九品蓮臺仍舊登接引寺雲臺禪師薦師請小參汝師今去本無去印老昔來本未來歷歷分明全體現好看鐵鋸舞三臺既然全體現即今在甚麼處豎拂子曰來也來也在拂子頭上現色身三昧告衆曰當處出生掛片雲於太虛雲性不動隨處沒盡滅一漚於湛海漚性無虧在天同天在人同人透一切色超一切聲剎剎塵塵無住著非心非佛絶羅籠是聖是凡難卜度遍周沙界無覆藏復以拂子畫相曰圓湛一輪常獨耀孤光萬古照乾坤王有福薦母夏正果請對靈小參生從何來處處黃花九月開死從何去行行鴻鴈飛不住去去來來合本人生生死死有根據只要回頭仔細觀始知自己安身處脫體無依任自由西方東土無疑慮為王夫人對靈小參閻浮幻體有生死個裏真常沒往來一念不生清淨土萬緣寂靜涅槃臺休擬議莫疑猜差錯毫釐隔九垓直須恁麼承當去朵朵蓮花火裏開莫有承當者麼為王夫人通一消息良久無人出驀以拂子打圓相曰了明這點無生意脫下凡胎入聖胎北塔院衆班吉為薦文部大喇嘛請小參拈拄杖卓一下曰生不離這裏來死不離這裏去此處即是他方他方即是此處敢問衆等還識汝師大喇嘛麼即今在般若拄杖頭邊吹大法螺繫大法鼓演大法義作大佛事只須剔起眉毛切忌當面錯過若是個漢向般若未動腳前未開口先直下領略得去不惟父母師長佛恩國恩一時盡報了也既然如是且道即今大喇嘛在甚麼處復卓杖一下曰不離當處常湛然覓則知君不可見吳正省居士請薦先考小參思報劬勞意念堅法輪轉處利無邊迷雲散盡性天朗昏障銷融心月圓迥脫三塗離苦海頓除八難越人天金臺逐步相推引去到西方坐寶蓮為印真左善世對靈小參本無今有笑看陽焰翻波已有還無喜見空花落影生也如是水流原在海死也如是月落不離天遂以拂子打相曰且道這個是生耶死耶有耶無耶復揮一揮曰若向這裏委悉得去始識無邊剎海自他不隔於毫端十世古今始終不離於當念便可以無相中現相無身處現身雖居一相中一相中收他不得雖居一切處一切處羅籠他不住雖然恁麼猶落在生死窠裏畢竟如何得不落生死窠裏遂振威一喝曰竹密不妨流水過山高豈礙白雲飛
