body:
  text: 侍者正繼記録嗣法門人正燈編輯住盛京般若禪寺語録康熙壬子歲冬十月受當道護法縉紳善信暨本寺監院等請於臘月朔日進院當日山主楊明俊率衆請上堂至法座前曰拽杖雲程蜀地來真風不二任安排今朝對衆親拈出只要人人莫自埋遂升座拈香奉為今上皇帝聖壽萬歲萬歲萬萬歲次拈香曰奉為本府京兆在任尊官伏願高遷祿位永固壽基復拈香曰此一瓣香不是嶺頭密付亦非雞足傳流昔在蜀中遭毒手而今塞外恨難酬爇向爐中供養先住貴州木皮庵現在武陵德山傳曹溪正脈第三十七世語嵩裔大和尚用酬法乳之恩遂斂衣就座上首白椎畢師曰一瓢一笠過三韓拄杖橫擔沒底籃倒跨楊岐跛驢子好收溈老牯牛關魔宮虎穴全身入鐵壁銀山盡底翻獨顯大機施大用不傳金色舊金襴遂提衣角問大衆曰既是不傳金襴此衣甚麼處得來莫有道得者麼試出道看問師唱誰家曲宗風嗣阿誰師曰不是彌勒前亦非釋迦後曰恁麼則昔日般若今朝和尚師曰謾勞塗污曰峨嵋親得旨塞外大敷揚師曰賺殺汝問馬祖一喝百丈三日耳聾意旨如何師曰赤心片片曰黃檗為甚麼吐舌師曰識法者懼乃曰自蜀散席萬里到來得遇楊山主留住此地又蒙章京王佟兩公又得京兆別駕陳季兩公及護法善信皈依成此般若叢林堅請山僧升座勉強應命藏之不得既藏不得分明露現試問諸人見不見若曰見實相之體本非青黃赤白長短方圓亦非見聞覺知之法且作麼生見若曰不見又道藏之不得為甚麼不見拈杖卓曰莫被拄杖子瞞始得看看拄杖子穿過汝等髑髏𨁝跳入汝等鼻孔裏去也汝等還覺寒毛卓豎麼復卓一卓下座佟望年等請上堂問青蓮一瞬金色知歸作家到來以何相待師曰飽餐明月爛嚼清風曰忽遇無舌人來又作麼生師曰無底橐子滿盛堆曰誰知別館池塘裏一對鴛鴦畫不成師曰只緣生落處切莫厭家貧曰今日已逢王膳宴大家拍手唱哩囉師曰三十年後有人證明在問如何是諸佛出身處師曰雲收山露頂僧曰意旨如何師曰河凍水凝流乃曰釋迦出世達磨西來廣設權變隨機應化無非教人踏著本地風光識取自己面孔於斯薦得可以荷負宗乘全身提掇管取三世諸佛合掌皈依歷代祖師低頭俯伏坐微塵裏轉大法輪於一毫端現寶王剎不是神通妙用亦非法爾如然乃人人具足個個圓成一段本有光明經過塵沙劫數不曾移易絲毫且道此光落在甚麼處顧視左右曰兩眼豁開全體現縱橫無處不親親李廣寂請上堂驀拈拄杖曰大衆見麼人人有眼必定是見喝一喝曰聞麼個個有耳必定是聞聞見分明復是何物若向這裏轉得身覷得透便可大方獨步高握權衡興慈運悲驅馳佛祖苟或未能只須打疊身心向三條椽下七尺單前豎起脊梁高著眼廝結眉毛仔細參忽然踏著消息子不妨與山僧拄杖打個折合遂卓一下曰努力今生取辦逗遛萬劫難逢劉金環陳寬闊等請上堂槌下薦得平地生塵句外承當無風起浪第一義諦作麼生觀若乃忘機守默已被維摩占先擬欲展演詞鋒又落能仁之後若是行棒行喝德山臨濟用過若更拈槌拈拂馬祖百丈曾施到這裏恁麼也不得不恁麼也不得恁麼不恁麼總不得作麼生委悉去揮拂一下曰一把柳絲收不得和煙搭在玉欄杆田加禎請上堂問如何是道師曰阿誰不踏著曰如何是道中人師曰往來無罣礙曰經曰唯此一事實餘二則非真如何是一事師劈頭一棒曰會麼僧罔措師曰直截提持猶不會忙忙業識幾時休乃曰今朝冬月一鐘鼓相催逼未動腳跟前好個真消息迎請到法床未免涉階級休把古人語將曲當作直一即六六即一赤鬚鬍鬍鬚赤驢覷井井覷驢不濕腳腳不濕通身與遍身何必共不必斑虎喚作貓總是妄分析愚拙這裏絶商量未容啓口打折脊若能直下解翻身一生參學大事畢僧録司陳寬闊請上堂問須菩提岩中晏坐天雨四花今日僧録同衆賁臨是何奇特師曰道義相親話歲寒曰閒持經卷倚門立笑問客從何處來師曰不是苦心人不知問佛未出時如何師曰清貧常樂曰佛已出時又如何師曰濁富多憂乃曰此事無拈弄處無啓口處遂拈拂子揮一揮曰無拈弄處已拈弄了又豎起問曰識此物否無啓口處已啓口了顧左右曰汝等何不領會若向這裏見得分明聞得透徹一念返本還源即具頂門正眼無邊剎海自他不隔於毫端十世古今始終不移於當念淨裸裸絶承當赤灑灑沒回互諸聖同躔衆機頓赴苟或未然莫將間學解埋沒祖師心實清衆等請上堂覓心覓性正如守株待兔窮玄窮妙大似張網兜風蓋不知真隨妄轉法逐緣遷如澄清大海浪起風生似皎潔太虛雲興雨作自蔽妙明枉勞神體昧卻靈山直指辜負少室別傳復舉拂子揮一揮曰這一著子非從外得昭昭日月森羅頓現於靈光蕩蕩目前彼此無分於實際非文字相離見聞緣一道平等山河匪礙塵塵成現剎剎圓明萬像之中長獨露千峰頂上現全身實襲請上堂問祖師未西來時如何師曰支那夜夜家家月曰已來時如何師曰幾處謳歌幾處悲問一切諸佛皆從此經出如何是此經師曰腳跟下薦取乃曰我本無心有所希求今此寶藏自然而至敢問大衆上是天下是地左是路右是溪前是功德主後是慈恩寺寶藏在甚麼處衆中還有道得者麼如無山僧自道去也震威一喝下座報恩寺都管覺宗請上堂八年爛臥鎬京地今日重登曲彔床正恁麼時難啓口全無佛法可商量菩提涅槃陽焰水佛性真如閃電光非佛非心空打橛即心即佛肉剜瘡與麼與麼冰求火不與麼是賊抱贓見色明心猶未徹聞聲悟道妄承當衆中若有英靈客試出當機共舉揚莫學丈師親馬祖休同臨濟個顛狂不勞據捉虎頭尾掀翻玄要播諸方既是掀翻玄要如何又播諸方恁麼中不恁麼不恁麼中卻恁麼到這裏孰敢正眼覷著且道其中還有恁麼人麼遂起拈杖卓一卓曰舉頭天外看誰是個中人寬寶張忠成請上堂問翠巖一點不點意旨如何師曰向前向爾道僧便進師便喝僧擬議師便打問窮子得寶不知是何寶師曰煞好一問曰請師酬價師便打曰是多少僧擬議師又打問如何是佛師曰千山路南去曰弟子不會師曰橫河水西流乃曰風不待月而涼火不待日而熱般若堂內安禪瞬息過了一月連日屢屢上堂貴要禪流休歇若能當下知歸便乃超宗越格若涉擬議思量白雲萬里不絶果能是非齊泯善惡都忘掀翻玄妙關打破無明窟迥出威音王高超毗盧頂透聲透色絶遮欄蓋天蓋地無向背喝一喝下座陳實一領衆請上堂問達摩西來不立文字和尚為甚麼說法師曰汝在甚處見山僧說法來曰恁麼則昔日達摩曾敷演今朝般若又重興師曰莫謗他好問古德曰釋迦彌勒猶是他奴他是個甚麼人師曰滅佛種族漢曰他具何面目師曰將此深心奉塵剎乃曰若一向舉揚宗乘所謂法堂前草深一丈山僧今日事不獲已放開一線道通個入路豎起拂子曰大衆識這個麼在天成象在地成形在四時作寒暑在日月為照臨在人則豎在畜則橫在有情動轉施為在無情森羅顯煥剎剎塵塵露現頭頭物物全彰諸佛識此具一切種智菩薩識此成就諸般波羅蜜獨覺識此向無佛世顯大神通聲聞識此得八解脫天人識此悟無生法修羅識此安住忍地地獄識此知罪性空餓鬼畜生四生九類一切有情識此隨其根性各得受用若向這裏會得拂子現神變相化作無邊身菩薩大千普應去也喝一喝卓拄杖下座信官穆清格請上堂乾坤之內宇宙之間中有一寶祕在形山達摩九年面壁覷不破瞿曇三百餘會道不著摩醯三眼也難見大悲千手也難摸歷代祖師古今知識咬定牙關一場懡㦬今日般若不免拈出供養大衆及大地有情無情同一眼見同一耳聞同一受用良久曰季冬嚴寒各歸煨火侍僧美然領衆請上堂問昔溈山問仰山曰山河大地日月星辰喚作事得麼仰山曰如是如是意旨如何師曰山僧今日不答話曰萬派千流歸渤海七金五嶽總須彌師曰猶是葛藤在乃舉石室見僧來拈起拄杖曰過去諸佛也恁麼現在諸佛也恁麼未來諸佛也恁麼圓悟曰過去諸佛不恁麼現在諸佛不恁麼未來諸佛不恁麼師曰一人在孤峰頂上喝風罵雨一人在十字街頭截鐵斬釘有擒有縱有殺有活且道恁麼的是不恁麼的是然雖如是放過則二俱作家點檢則二俱失利何也恁麼不恁麼兩沒交涉山僧則不然拈拄杖卓一卓曰過去諸佛在這裏現在諸佛在這裏未來諸佛在這裏還有檢點得出的麼良久曰三段不同收歸上科祁天長請上堂問氣宇昂藏來震國一言不契羞慚極心懷塗毒嵩山坐分骨分髓太狼藉狼藉即不問因甚遞相鈍置師曰蠱毒之家水莫嘗曰飲者何如師曰死僧喝師曰相隨來也僧掩耳而出師曰腦後見腮莫與往來問如何是法身邊事師曰利名盡處江山窄煩惱忘時世界寬曰如何是法身向上事師曰任運騰騰隨分度更嫌何處不風流乃曰世尊拈花迦葉破顏四七分芳過東土達摩面壁神光斷臂二三流派到南能佛佛授手祖祖傳燈到此始分二派向後又成五宗臨濟賓主互換雲門顧鑑圓融溈仰父子投機曹洞君臣合從法眼直指唯心各自建立門風瞎驢一支茂盛烜赫浩浩轟轟枝枝葉葉無數三十四傳天童威聲振動寰宇六處萬人興隆親傳嗣有十二超群讓我師翁九坐道場無匹後來獨踞巫峰雙桂堂前杯酒時人盡喪其中今日正眼看來灼然道在人弘喝一喝曰會麼不見道道無隱顯遇緣即宗法無去來因時而會然雖如是猶是建化門邊事若論向上一著猶未在如何是向上一著直下一槌皆粉碎乾坤大地盡光輝示衆百日安禪將一半己躬下事莫遲疑寸陰有限嗟誰惜一念回觀返自思鎖卻狂猿勿浪走牢拴劣馬住奔馳胸中有物蕩教盡足下無絲不用除廝結眉毛咬定齒精勤腦後痛加鎚心心似解倒懸急切切如同救火時烈焰亙天渾不顧翻身直透萬重圍須彌倒卓虛空碎拶破娘生鐵面皮始識頂𩕳具隻眼當陽直截照無私縱橫倜儻忘羈絆觸處隨緣樂自如若不如斯深負己營求聲譽作何為相酬園菌愧無愧泣淚坡前悲弗悲珍重諸公當省力身沉苦海實難移冬至日實利領衆請上堂烏兔奔忙曉夜催流光又爾一陽回虛空碾得無藏處萬象齊來芥裏埋大衆還知芥子安身處麼豎起拂子曰山河大地草木叢林全承此力天以此而清地以此而寧日以此而照月以此而明君王以此萬國來賓宰輔以此為政治民百姓以此共樂升平衲僧以此運用無盡顧左右曰切莫錯認且道陰捲陽回一句作麼生道冷冰未得隨橫水春信將來寄雪梅剛實首請上堂問學人乍入宗門求師指示師曰早晨洗面莫教摸著鼻孔曰摸著時如何師曰冤害殺人問摩騰入漢已涉繁詞達摩西來一場特地今朝升座將何表示師曰蜀中留不得塞外任人嫌曰莫就是和尚為人處麼師曰家裏已無回日信路邊空有望鄉牌曰恁麼則千里同風去也師曰長行書不盡短偈絶人聞曰長安處處家家月幾處笙歌幾處愁師曰抓著般若癢處乃曰煆生死顯超宗越格之規模煉聖凡彰全殺全活之機用所以馬祖一喝百丈三日耳聾寶壽令行鎮州一城眼瞎黃檗三頓棒臨濟全身擔荷龍潭吹滅燈德嶠直下承當驀豎起拂子曰這一隊老漢同無量佛祖盡在拂子頭上演大法義轉大法輪汝等信得及麼若信得及法法本自圓成念念悉皆具足不勞修證得大受用且道受用一句作麼生不起纖毫修學心無相光中常自在下座道元領衆請上堂老宿能仁問時有阿私仙來白於大王師曰說箇甚麼曰我有微妙法世間所希有師曰破草鞋宿無語師震威一喝曰會麼曰不會師曰不會微妙法會得破草鞋乃曰談玄七七說無說一瞬青蓮渾漏泄因此後來傳直指明人往往成途轍爐內火紅庭前雪白誰道融融只一色簷前鵲噪枝上鴉鳴誰道關關只一聲日日東來日日西去誰道如如不遷義已離南楚今過北塞誰道巍巍不動身不識這些消息子空認山河作眼睛善信人孫添壽同妻李實航請上堂問龐公將家資沉於湘水今日孫氏施財飯僧與龐公是同是別師曰眉分八字兩耳垂肩曰且道承誰恩力師曰東風昨日至花發樹頭春曰深閨簾幕千家月落日樓臺一樣風師曰逢人但恁麼舉乃曰阿呵呵是甚意口吃飯鼻出氣一不成二不是赤灑灑明歷歷非心機所擇非計較所及六祖曰不會達摩道不識謾曰北斗藏身休道南山鱉鼻中原至寶難酬價西江一口易得吸般若堂內衆禪和磨褌擦褲半百日半百日浮逼逼浮逼逼總為不識丘乙巳驀然撞著仲尼門下短命底顏回啐原來是這箇可知禮可知禮在這裏遂拈拂子拂一拂曰在者裏臘月三十日到來也是開眼見鬼臘八日實悟請上堂問盡大地是箇般若門為甚把手拽不入師曰為他腳根點地鼻孔撩天曰和尚前日道殺佛殺祖殺阿羅漢是甚麼意師曰只許獰龍會不許跛鱉知乃曰眼聽音聲耳見色舌聞香臭鼻言說身分善惡意覺觸六月嚴寒臘月熱男身入定女身出盞子落地破是碟柳樹著箭桑迸汁石人喫棒空流血如斯見得明白方知黃面老漢未離兜率已降皇宮未出母胎度人已畢豈待毗藍園內方名為生夜睹明星方名曰悟及至三歎奇哉分禪教律四十九年屙漉漉地多少落節引得後代兒孫將祖宗家醜盡底揚出免教後人向明星下妄想邊討悟分迷然雖如是正當恁麼時還有為釋迦老子雪屈者麼若有出來與般若拄杖子相見若無更聽一偈水雲開關人天徑珍重時人努力行打破目前關捩子莫教杓卜聽虛聲傳學領衆請上堂若論第一義箇箇頂𩕳上如如不動人人腳跟下了了分明非玄非妙非異非如非聞見覺知所以道才起一念見他便隔一座須彌才起一念知他便乃沾黏點污若能屏脫見聞覺知直下領略得去見則便見正法眼藏昭昭溢目知則便知涅槃妙心晃晃通身於一毫上現恆沙諸佛之全身於一念中現無邊衆生之世界然則如是猶是閉門造車未是出門合轍且道合轍一句作麼生落霞孤鶩齊飛秋水長天一色元旦日實融請上堂今上祝延一瓣香爐中爇向露堂堂十方世界無藏覆函蓋乾坤悉已彰舉目分明沒漸次莫教擬議更思量楊登科請上堂乃揮拂曰這裏會去甚省心力便可荷負吾宗衆中還有恁麼人麼如無智上座不識好惡向第二義門頭為諸人重重話會去也若論此事不論僧俗男女賢愚貴賤悉皆具足毫無缺少只為根有利鈍見有淆訛向是非邊聲色裏轉卻不見道名言滯於心內恆為緣慮之場實際在於目前翻作名相之境若得正眼圓明見刺盡除一法不墮緣塵萬法本無罣礙所以盧老不識字頓明佛意白兆不識書圓悟宗乘到這裏須是有節操極慷慨斬釘截鐵漢始得若是畏刀避箭碌碌之徒看即有分既然如是且道具足箇甚麼喝一喝曰雪後始知松柏操事難方見丈夫心僧妙智請上堂舉德山小參示衆曰老僧今夜不答話問話者三十棒時有僧出禮拜山便打僧曰某甲話也未問因甚打某甲山曰你是甚處人僧曰新羅人山曰未跨船舷好與三十棒圓悟曰德山大似金輪聖王寰中獨據四方八表無不順從等間布一敕施一令直得草偃風行若不是這僧爭見殺活擒縱威德自在法眼曰大小德山話作兩橛圓明曰大小德山龍頭蛇尾雪竇曰德山握閫外威權有當斷不斷不招其亂底劍雖則直截單提各能扶豎德山要且只扶得末後句未扶得最初句在且作麼生是最初句大鵬欲展摩霄翅誰顧奔騰六合雲師曰奇持因緣須以奇特激發殊勝大事須以殊勝舉揚圓明有驗人句法眼有超宗眼圓悟順水推船雪竇迎風把舵雖然各出手眼成得個什麼邊事若是山僧待他道某甲話也未問因甚便打復打曰可殺不識好惡當時德山下得這一棒不惟截斷天下人舌頭也免得他道個龍頭蛇尾耿門呂氏請上堂問新建般若則不問因齊慶讚請師宣師曰東山雨過松添翠橫水增流浪更深曰恁麼則塵垢盡除光始現乾坤大地露全身師曰莫著相乃曰重整頽綱闡揚法化非金石心肝生鐵鑄底脊梁亦不能弘持此道豈志淺之流而能為之雖然如是恁般說話如仰面尋地低頭覓天信官王養民請上堂問掬沙獻佛果感輪王設齊飯僧斯成何美師曰介爾景福錫爾眉壽曰古柏煙籠清晝永滿庭蘭蕙彩衣歡師曰一任縱橫問無眼耳鼻舌身意因甚又道見聞覺知師曰扶過斷橋水伴歸明月村曰恁麼則個中若了全無事體用何妨分不分師曰泥裏洗土塊乃曰若是明眼漢不遊諸佛機關不墮祖師窩曰明如杲日寬若太虛放曠逍遙有甚麼事然到者裏必同道者方知同得者方證且道作麼生說個同得同證道理莫是菩提涅槃真如佛性得麼莫是人境俱奪照用同時得麼莫是即心即佛非心非佛得麼莫是人我是非得失雙忘者麼總沒交涉不見道擬剔眉毛早錯過才涉思量隔萬山張常信請上堂問給孤長者捨金布園而求功德今日張公領衆設齊有何功德師曰重若泰山抬不起深如滄海掬難乾曰與麼則隨家豐儉去也師曰種粟得粟乃曰正令全提貴在臨機直截當陽顯現須教當下知歸到這裏不假擬議思惟只要全身擔荷直得有佛處不得住無佛處急走過上無攀仰下絶己躬所以道衲僧家行則廓爾周沙界坐則芥子納須彌把住乾坤都失色放行大地沒遮攔且道衆中還有恁麼人麼若有試出相見若無未免氣急殺人解制實隆請上堂問久默斯要不務速說師還答否師曰答其僧驀擒一僧曰請師答話師便打曰正賊走卻虜贓人受罪乃曰今朝正是元宵節百日爐鎚今日歇拂子茶條來報怨剜心剖腹沒人測山僧何故不知休猶自饒唇鼓美舌為要人人兩足尊與伊拔出頂𩕳楔聖賢具足凡夫法凡夫具足聖賢訣石頭尚自將頭點衲子如何不自瞥若是吾門過量漢未容登座早通徹果能如是徹根源解未解兮結未結著佛衣兮行佛行入佛室兮稱佛杰猶然還自不知曉未免重重話直截鑼鼓喧喧花炮響家家戶戶盡歡悅裝龍辦鬼滿街跳般若真機渾漏泄一切音聲是佛聲一切衆色是佛色大洋海底撞金鐘須彌山王頭腦裂驚起法身藏北斗森羅萬象骨筋折不是西天祕密傳亦非東土繫驢橛直下不能明了去汝自東西我自北拽杖下座
