front:
  text: 序古林禪師亦吾徒之特異者也浮屠之學非善幻多術之謂所貴了脫生死耳彼蓋於去來之際為尤異何異乎異其生死自主焉可死即死欲未死即復生期死則又死乙亥仲冬既望跏趺坐逝一夕矣次旦忽起如平時一一指示立塔及荼毗事從容至晦日手書招故人與別送之出門經行院中夜半歸丈室凝坐命弟子燃香二寸始入見端居不動手腕溫軟題偈墨汁尚淋漓凡上非去來自主而能若是乎則豈非吾徒之特異者乎及舉火時煙焰發五色龕開現金色毗盧像衣摺數珠宛然舍利無數一齒不壞異乎不異余連歲瓢笠南北得於諸方傳述者如此今春息影謝客經函禪榻昕夕掩關適深雪草堂霽崙法兄過訪菴中具伊蒲而別留古林語録索序是時晴雪初消菴中探春盛放下簾呼茗取一編向花香燈影間披讀終卷覺舍利光毗盧金像倣佛從側理中出為合爪贊喜久之夫余與古林同出雙桂一支既不可以不文辭遂略其語言文字而托拾生死一事紀之緘寄深雪當廣示學人使知古林者果了脫生死去來自主而為吾徒之特異者也鷓鴣頭陀超斯撰序古林智禪師語録序古公得法語公語公得法雪公雪公得法破山和尚破和尚得法密雲老人多奇諸方能言之古公余鄉人志亦倣佛少棄家參學頓悟第一義藏峨嵋山中成自了漢不欲諸方知有古公余曾披緇衣混迹麋鹿或倚扁舟武陵溪上騁望江湖記桃花開落浮遊餘景而世路播遷古公不獲臥雲松余不獲辭簿書乃相遇於遼之左此間昔有講律無宗粵東剩公發焚修繼赤公古公於是翕然知曹洞臨濟剩公出自爨下始末尤奇詳其語録赤公東剩公左右之古公來赤公周旋之古公懷其素志甘嚙冰雪執牧豎事而大法將行潤澤湯沐種菩提於寸心消泡影於八識人天共推此古公所不能自已者也遂登般若座闡破山旨三期般若成大叢林剩公赤公有志未行者飯貧衣寒恤病孩委棄斂暴露古公悉舉之故人人以古公為歸若其機鋒觸發作獅子吼用破山之奇為正用正為奇莫可把鼻真不愧為破山後人余與古公往來凡八年轉治江右將別古公情思黯然念關東風俗朴厚得三大和尚開示一切今為樂土且當事寬簡僚屬多暇日而萬里之行其何以別我古公公曰子行矣其序我語録余何辭惟述豫之所知見及聚散之不得於志者以告諸方然古公雲水人也他日或握手茅庵漁浦望朔雲塞月如家常話則又未必不如其志也謹序時康熙乙卯歲菊月九日奉天府通判升江西廣信府同知楚武陵舊衲弟季渾拜手題古林智禪師語録目次卷首序文卷第一盛京般若禪寺語録卷第二遼陽如來禪院語録卷第三遼陽建寧禪寺語録普説卷第四奉天府東前山臺大悲禪寺語録機緣頌古小佛事法語卷第五偈上卷第六偈下行狀古林智禪師語録目次終
